<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Book a Course | Base Associates CPA</title>
  <link rel="icon" href="logo.png" type="image/png">
  <link rel="stylesheet" href="styles.css"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <style>
    body{background:var(--cream)}
    .booking-wrap{max-width:740px;margin:0 auto;padding:48px 2rem 80px}
    .booking-header{text-align:center;margin-bottom:36px}
    .booking-header h1{font-size:1.8rem;margin-bottom:6px}
    .booking-header p{color:var(--text-muted);font-size:14px}
    .bcard{background:var(--white);border-radius:var(--radius-xl);padding:40px;box-shadow:var(--shadow-lg)}
    .bcard h2{font-size:1.4rem;margin-bottom:6px}
    .bcard .sub{font-size:14px;color:var(--text-muted);margin-bottom:28px}
    .course-pill{background:var(--green-pale);border:1px solid rgba(27,122,74,.2);border-radius:var(--radius-md);padding:12px 16px;font-size:13px;color:var(--text-body);margin-bottom:22px;display:flex;align-items:center;gap:10px}
    .course-pill strong{color:var(--text-dark)}
    .nav-btns{display:flex;justify-content:space-between;margin-top:28px;flex-wrap:wrap;gap:10px}
    .nav-btns.right{justify-content:flex-end}
    .policy-note{background:var(--gold-pale);border:1px solid var(--gold-border);border-radius:var(--radius-md);padding:12px 16px;font-size:12px;color:#8B6914;margin-top:16px;line-height:1.6}
    .promo-row{display:flex;gap:8px;margin:16px 0}
    .promo-row input{flex:1;padding:10px 14px;border:1.5px solid var(--cream-dark);border-radius:var(--radius-md);font-family:var(--font-body);font-size:13px;color:var(--text-dark)}
    .promo-row input:focus{outline:none;border-color:var(--gold)}
    .phone-input-wrap{position:relative}
    .phone-prefix{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-weight:700;color:var(--text-dark);font-size:14px;pointer-events:none}
    .phone-input-wrap input{padding-left:54px!important}
    .booking-ref-box{background:var(--cream);border-radius:var(--radius-md);padding:14px 24px;text-align:center;font-size:1.1rem;font-weight:700;color:var(--text-dark);letter-spacing:.1em;margin:20px 0;border:1.5px dashed var(--cream-dark)}
    .slot-item.disabled{opacity:.5;cursor:not-allowed;pointer-events:none}
    .avail-red{background:#fde8e8;color:#c0392b;border:1px solid rgba(192,57,43,.25)}

    /* Auth tabs inside payment step */
    .auth-tabs{display:flex;border-bottom:2px solid var(--cream-dark);margin-bottom:24px}
    .auth-tab{flex:1;padding:12px;border:none;background:none;cursor:pointer;font-family:var(--font-body);font-size:14px;font-weight:600;color:var(--text-muted);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s;text-align:center}
    .auth-tab.active{color:var(--green);border-bottom-color:var(--green)}
    .auth-panel{display:none}
    .auth-panel.active{display:block}
    .auth-divider-line{display:flex;align-items:center;gap:10px;margin:16px 0;font-size:12px;color:var(--text-muted)}
    .auth-divider-line::before,.auth-divider-line::after{content:'';flex:1;height:1px;background:var(--cream-dark)}

    /* Logged-in badge */
    .logged-in-badge{background:var(--green-pale);border:1px solid rgba(27,122,74,.25);border-radius:var(--radius-md);padding:12px 16px;font-size:13px;color:var(--text-body);display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
    .logged-in-badge strong{color:var(--green)}
  </style>
</head>
<body>

<nav class="site-nav has-mobile-nav">
  <a href="index.html" class="nav-brand">
    <img src="logo.png" alt="Base Associates CPA" style="height:52px;width:auto;display:block;">
    <div class="nav-brand-text"><span class="name">base associates</span><span class="sub">Certified Public Accountants</span></div>
  </a>
  <div class="nav-links"><a href="courses.html" class="nav-link">← Back to Courses</a></div>
  <div class="nav-right" id="nav-user-area">
    <a href="login.html" class="nav-link">Login</a>
    <a href="register.html" class="nav-cta">Register</a>
  </div>
  <button class="nav-toggle" id="nav-toggle" aria-label="Toggle menu" aria-expanded="false">
    <span></span><span></span><span></span>
  </button>
</nav>
<div class="nav-mobile-menu" id="nav-mobile-menu">
  <a href="courses.html"   class="mob-nav-link">← Back to Courses</a>
  <hr class="mob-divider">
  <a href="index.html"     class="mob-nav-link">Home</a>
  <a href="dashboard.html" class="mob-nav-link">Dashboard</a>
  <hr class="mob-divider">
  <a href="login.html"    class="mob-nav-link">Login</a>
  <a href="register.html" class="mob-nav-link mob-cta">Register Free</a>
</div>

<div class="booking-wrap">
  <div class="booking-header">
    <span class="tag">Secure Booking</span>
    <h1>Book Your Course</h1>
    <p id="booking-course-sub">Loading course…</p>
  </div>

  <!-- 3 steps: Session · Details · Payment+Confirm -->
  <div class="steps-bar">
    <div class="step"><div class="step-circle active" id="sc1">1</div><div class="step-label active" id="sl1">Session</div></div>
    <div class="step-line" id="ln1"></div>
    <div class="step"><div class="step-circle" id="sc2">2</div><div class="step-label" id="sl2">Your Details</div></div>
    <div class="step-line" id="ln2"></div>
    <div class="step"><div class="step-circle" id="sc3">3</div><div class="step-label" id="sl3">Pay &amp; Confirm</div></div>
  </div>

  <div id="step-content"></div>
</div>

<script>
// ── State ────────────────────────────────────────────────
let currentStep    = 1;
let timerSec       = 600;
let timerInt       = null;
let currentUser    = null;
let currentProfile = null;
let courseData     = null;
let selectedSlot   = null;
let selectedMethod = null;
let bookingRef     = '';
let slotCounts     = {};

const SLOT_CAPACITY = 10;

async function loadSlotCounts() {
  const { data } = await getSB()
    .from('bookings')
    .select('session_slot')
    .eq('course_id', courseData.id)
    .eq('status', 'confirmed');
  slotCounts = {};
  if (data) {
    data.forEach(b => {
      slotCounts[b.session_slot] = (slotCounts[b.session_slot] || 0) + 1;
    });
  }
}

// Learner details (collected in step 2)
let guestName  = '';
let guestEmail = '';
let guestPhone = '';
let guestJob   = '';
let guestOrg   = '';

// ── EmailJS config ────────────────────────────────────────
// SETUP: Go to https://emailjs.com → free account → Email Services → Add Gmail
// Then create an Email Template and paste the IDs below.
// Template variables available: {{to_name}}, {{to_email}}, {{booking_ref}},
//   {{course_title}}, {{session_slot}}, {{amount_ugx}}
const EMAILJS_PUBLIC_KEY   = 'YOUR_PUBLIC_KEY';    // Account → API Keys
const EMAILJS_SERVICE_ID   = 'YOUR_SERVICE_ID';    // Email Services tab
const EMAILJS_TEMPLATE_ID  = 'YOUR_TEMPLATE_ID';   // Email Templates tab

// Initialise once
if (EMAILJS_PUBLIC_KEY !== 'YOUR_PUBLIC_KEY') {
  emailjs.init({ publicKey: EMAILJS_PUBLIC_KEY });
}

async function sendBookingEmail({ toName, toEmail, bookingRef, courseTitle, sessionSlot, amountUgx }) {
  if (EMAILJS_PUBLIC_KEY === 'YOUR_PUBLIC_KEY') return; // not configured yet
  try {
    await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
      to_name:      toName,
      to_email:     toEmail,
      booking_ref:  bookingRef,
      course_title: courseTitle,
      session_slot: sessionSlot,
      amount_ugx:   'UGX ' + Number(amountUgx).toLocaleString(),
    });
  } catch (e) {
    console.warn('Email send failed:', e);
  }
}

// ── Init ─────────────────────────────────────────────────
(async () => {
  // Check if already logged in — silently, no redirect
  currentUser    = await getUser();
  currentProfile = currentUser ? await getProfile(currentUser.id) : null;

  // Update nav if logged in
  if (currentUser && currentProfile) {
    const initial = (currentProfile.full_name || currentUser.email)[0].toUpperCase();
    document.getElementById('nav-user-area').innerHTML =
      '<div class="nav-user" style="display:flex;align-items:center;gap:8px;">'
      + '<div class="nav-avatar">' + initial + '</div>'
      + '<span style="font-size:13px;font-weight:600;color:var(--green);">' + (currentProfile.full_name || 'Account') + '</span>'
      + '</div>'
      + '<a href="dashboard.html" class="nav-link">Dashboard</a>';
  }

  // Load course from URL
  const params = new URLSearchParams(window.location.search);
  const cid = parseInt(params.get('id')) || 13;
  courseData = COURSES.find(c => c.id === cid) || COURSES[12];
  document.getElementById('booking-course-sub').textContent =
    courseData.title + ' — UGX ' + COURSE_TOTAL.toLocaleString();

  renderStep();
})();

// ── Step UI ───────────────────────────────────────────────
function updateSteps() {
  for (let i = 1; i <= 3; i++) {
    const c = document.getElementById('sc' + i);
    const l = document.getElementById('sl' + i);
    c.className = 'step-circle' + (i < currentStep ? ' done' : i === currentStep ? ' active' : '');
    l.className = 'step-label'  + (i === currentStep ? ' active' : '');
  }
  for (let i = 1; i <= 2; i++) {
    const ln = document.getElementById('ln' + i);
    if (ln) ln.className = 'step-line' + (i < currentStep ? ' done' : '');
  }
}

function timerDisplay() {
  return String(Math.floor(timerSec / 60)).padStart(2,'0') + ':' + String(timerSec % 60).padStart(2,'0');
}

function startTimer() {
  clearInterval(timerInt);
  timerInt = setInterval(() => {
    timerSec--;
    const el = document.getElementById('timer-count');
    if (el) { el.textContent = timerDisplay(); if (timerSec <= 60) el.style.color = 'var(--danger)'; }
    if (timerSec <= 0) { clearInterval(timerInt); alert('⏰ Your hold has expired.'); window.location.href = 'courses.html'; }
  }, 1000);
}

// ── RENDER ────────────────────────────────────────────────
async function renderStep() {
  updateSteps();
  const el = document.getElementById('step-content');
  window.scrollTo(0, 0);

  // ────────────────────────────────────────────────────────
  // STEP 1 — Select Session Time
  // ────────────────────────────────────────────────────────
  if (currentStep === 1) {
    el.innerHTML = `<div class="bcard"><p style="color:var(--text-muted);font-size:14px;">Loading session availability…</p></div>`;
    await loadSlotCounts();
    el.innerHTML = `
    <div class="bcard">
      <h2>Select Your Session Time</h2>
      <p class="sub">Choose the daily time slot — same slot for all 3 days of the course</p>
      <div class="course-pill">📚 <span><strong>${courseData.title}</strong> &nbsp;·&nbsp; 3 Days &nbsp;·&nbsp; Online via Zoom</span></div>
      <div class="slot-grid">
        ${SESSION_SLOTS.map(s => {
          const slotKey   = s.name + ' · ' + s.time;
          const count     = slotCounts[slotKey] || 0;
          const isFull    = count >= SLOT_CAPACITY;
          const spotsLeft = SLOT_CAPACITY - count;
          const pillClass = isFull ? 'avail-red' : spotsLeft <= 3 ? 'avail-amber' : 'avail-green';
          const pillText  = isFull ? 'Full' : spotsLeft + ' spot' + (spotsLeft === 1 ? '' : 's') + ' left';
          const isSelected = selectedSlot === s.id && !isFull;
          return `
        <div class="slot-item${isFull ? ' disabled' : ''}${isSelected ? ' selected' : ''}"
          onclick="document.querySelectorAll('.slot-item').forEach(x=>x.classList.remove('selected'));this.classList.add('selected');selectedSlot='${s.id}';">
          <div><div class="slot-date">${s.name}</div><div class="slot-time">${s.time} &nbsp;·&nbsp; Days 1, 2 &amp; 3</div></div>
          <span class="avail-pill ${pillClass}">${pillText}</span>
        </div>`;
        }).join('')}
      </div>
      <div class="nav-btns right" style="margin-top:28px;">
        <button class="btn btn-primary btn-lg" onclick="step1Next()">Continue →</button>
      </div>
    </div>`;
    startTimer();

  // ────────────────────────────────────────────────────────
  // STEP 2 — Learner Details
  // ────────────────────────────────────────────────────────
  } else if (currentStep === 2) {
    const prefillName  = currentProfile?.full_name  || guestName  || '';
    const prefillEmail = currentUser?.email          || guestEmail || '';
    const prefillPhone = currentProfile?.phone       || guestPhone || '';
    const prefillJob   = currentProfile?.job_title   || guestJob   || '';
    const prefillOrg   = currentProfile?.organisation|| guestOrg   || '';

    el.innerHTML = `
    <div class="bcard">
      <h2>Your Details</h2>
      <p class="sub">These details will appear on your booking confirmation and CPD certificate</p>
      <div class="timer-alert">⏳ Session hold expires in <span class="timer-count" id="timer-count">${timerDisplay()}</span></div>
      <div class="alert alert-danger" id="s2-err" style="display:none;">⚠ <span id="s2-err-txt"></span></div>
      <div class="form-row">
        <div class="form-group"><label>First Name *</label><input id="s2-first" type="text" value="${prefillName.split(' ')[0]||''}" placeholder="James"/></div>
        <div class="form-group"><label>Last Name *</label><input id="s2-last"  type="text" value="${prefillName.split(' ').slice(1).join(' ')||''}" placeholder="Mukasa"/></div>
      </div>
      <div class="form-group"><label>Email Address *</label><input id="s2-email" type="email" value="${prefillEmail}" placeholder="you@example.com"/></div>
      <div class="form-group"><label>Phone Number *</label><input id="s2-phone" type="tel"   value="${prefillPhone}" placeholder="+256 700 000000"/></div>
      <div class="form-row">
        <div class="form-group"><label>Job Title</label><input id="s2-job" type="text" value="${prefillJob}" placeholder="e.g. Accountant"/></div>
        <div class="form-group"><label>Organisation</label><input id="s2-org" type="text" value="${prefillOrg}" placeholder="Company name"/></div>
      </div>
      <div class="nav-btns">
        <button class="btn btn-outline-green" onclick="prevStep()">← Back</button>
        <button class="btn btn-primary btn-lg"  onclick="step2Next()">Continue →</button>
      </div>
    </div>`;

  // ────────────────────────────────────────────────────────
  // STEP 3 — Pay & Confirm (login/register here if needed)
  // ────────────────────────────────────────────────────────
  } else if (currentStep === 3) {
    const slot = SESSION_SLOTS.find(s => s.id === selectedSlot);
    const authSection = currentUser
      ? `<div class="logged-in-badge">
           <span>✅ Booked as <strong>${currentProfile?.full_name || currentUser.email}</strong></span>
           <button class="btn btn-outline-green btn-sm" onclick="getSB().auth.signOut().then(()=>window.location.reload())">Switch account</button>
         </div>`
      : `<div style="background:var(--cream);border-radius:var(--radius-lg);padding:24px;margin-bottom:24px;">
           <p style="font-size:14px;font-weight:600;color:var(--text-dark);margin-bottom:4px;">🔐 Sign in or create an account to complete your booking</p>
           <p style="font-size:13px;color:var(--text-muted);margin-bottom:20px;">Your session selection and details have been saved.</p>
           <div class="auth-tabs">
             <button class="auth-tab active" id="tab-login-btn"    onclick="switchAuthTab('login')">I have an account</button>
             <button class="auth-tab"        id="tab-register-btn" onclick="switchAuthTab('register')">Create account</button>
           </div>

           <!-- LOGIN PANEL -->
           <div class="auth-panel active" id="auth-login">
             <div class="alert alert-danger" id="login-err" style="display:none;">⚠ <span id="login-err-txt"></span></div>
             <div class="form-group"><label>Email Address</label><input id="li-email" type="email" placeholder="you@example.com" value="${guestEmail}"/></div>
             <div class="form-group"><label>Password</label><input id="li-pass" type="password" placeholder="Your password"/></div>
             <button class="btn btn-primary btn-full" id="li-btn" onclick="doInlineLogin()">Sign In &amp; Continue →</button>
             <p style="font-size:12px;color:var(--text-muted);text-align:center;margin-top:10px;"><a href="forgot-password.html" class="auth-link">Forgot password?</a></p>
           </div>

           <!-- REGISTER PANEL -->
           <div class="auth-panel" id="auth-register">
             <div class="alert alert-danger" id="reg-err" style="display:none;">⚠ <span id="reg-err-txt"></span></div>
             <div class="form-row">
               <div class="form-group"><label>First Name *</label><input id="rg-first" type="text" value="${guestName.split(' ')[0]||''}"/></div>
               <div class="form-group"><label>Last Name *</label><input id="rg-last"  type="text" value="${guestName.split(' ').slice(1).join(' ')||''}"/></div>
             </div>
             <div class="form-group"><label>Email Address *</label><input id="rg-email"    type="email" value="${guestEmail}"/></div>
             <div class="form-group"><label>Password *</label><input id="rg-pass"     type="password" placeholder="Min 8 characters"/></div>
             <button class="btn btn-primary btn-full" id="rg-btn" onclick="doInlineRegister()">Create Account &amp; Continue →</button>
           </div>
         </div>`;

    el.innerHTML = `
    <div class="bcard">
      <h2>Order Summary &amp; Payment</h2>
      <p class="sub">Review your booking, then sign in or register to pay</p>
      <div class="timer-alert">⏳ Session hold expires in <span class="timer-count" id="timer-count">${timerDisplay()}</span></div>
      <div class="alert alert-danger" id="pay-err" style="display:none;">⚠ <span id="pay-err-txt"></span></div>

      <!-- Order summary -->
      <div style="background:var(--cream);border-radius:var(--radius-lg);padding:20px;margin-bottom:24px;">
        <div class="order-row"><span class="lbl">Course</span><span class="val" style="font-size:12px;text-align:right;max-width:260px;">${courseData.title}</span></div>
        <div class="order-row"><span class="lbl">Session</span><span class="val">${slot?.name} · ${slot?.time}</span></div>
        <div class="order-row"><span class="lbl">Duration</span><span class="val">3 Days · Online</span></div>
        <div class="order-row"><span class="lbl">CPD Certificate</span><span class="val">Included</span></div>
        <div class="order-row"><span class="lbl">Course Fee</span><span class="val">UGX 100,000</span></div>
        <div class="order-total"><span class="lbl">Total Due</span><span class="val">UGX 100,000</span></div>
      </div>

      <!-- Promo code -->
      <div class="promo-row">
        <input type="text" id="promo-code" placeholder="Promo / discount code (optional)"/>
        <button class="btn btn-outline-green btn-sm" onclick="applyPromo()">Apply</button>
      </div>
      <div class="alert" id="promo-msg" style="display:none;margin-bottom:12px;"></div>

      <!-- Auth section — login/register or logged-in badge -->
      ${authSection}

      <!-- Payment method — only shown when logged in -->
      <div id="payment-section" style="display:${currentUser?'block':'none'};">
        <p style="font-size:13px;font-weight:700;color:var(--text-dark);margin-bottom:12px;">Select Payment Method:</p>
        <div class="payment-methods">
          <div class="pay-card mtn-card" id="pm-mtn" onclick="selectMethod('mtn')">
            <div class="pay-logo">📱</div>
            <div class="pay-name" style="color:#C8A000;">MTN Mobile Money</div>
            <div class="pay-sub">MTN Uganda numbers</div>
            <div style="margin-top:10px;font-size:11px;font-weight:700;background:var(--mtn-yellow);padding:3px 10px;border-radius:50px;display:inline-block;color:#1A1A1A;">MTN MoMo</div>
          </div>
          <div class="pay-card airtel-card" id="pm-airtel" onclick="selectMethod('airtel')">
            <div class="pay-logo">📱</div>
            <div class="pay-name" style="color:var(--airtel-red);">Airtel Money</div>
            <div class="pay-sub">Airtel Uganda numbers</div>
            <div style="margin-top:10px;font-size:11px;font-weight:700;background:var(--airtel-red);padding:3px 10px;border-radius:50px;display:inline-block;color:var(--white);">Airtel Money</div>
          </div>
        </div>

        <div id="phone-section" style="display:none;margin-top:20px;">
          <div class="form-group">
            <label id="phone-label">Mobile Money Number</label>
            <div class="phone-input-wrap">
              <span class="phone-prefix">+256</span>
              <input type="tel" id="momo-phone" placeholder="7XX XXX XXX" maxlength="12"
                oninput="this.value=this.value.replace(/[^0-9]/g,'');showUSSD()"/>
            </div>
            <div class="field-error" id="e-momo-phone">Enter a valid Uganda mobile number.</div>
          </div>
          <div class="ussd-box" id="ussd-box" style="display:none;">
            <p style="font-size:11px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;">How to Pay</p>
            <div class="ussd-code" id="ussd-code"></div>
            <ol class="ussd-steps" id="ussd-steps"></ol>
          </div>
        </div>

        <div class="policy-note" style="margin-top:16px;"><strong>Cancellation Policy:</strong> Full refund if cancelled ≥ 7 days before start · 50% credit 3–6 days · No refund within 2 days.</div>

        <div class="nav-btns" style="margin-top:24px;">
          <button class="btn btn-outline-green" onclick="prevStep()">← Back</button>
          <button class="btn btn-primary btn-lg" id="pay-btn" onclick="doPayment()">Confirm &amp; Pay UGX 100,000 →</button>
        </div>
        <p style="text-align:center;font-size:11px;color:var(--text-muted);margin-top:10px;">🔒 Secure booking · Your data is protected</p>
      </div>

      <!-- Back button when not logged in -->
      ${!currentUser ? `<div style="margin-top:16px;"><button class="btn btn-outline-green" onclick="prevStep()">← Back</button></div>` : ''}
    </div>`;

    if (selectedMethod) selectMethod(selectedMethod);

  // ────────────────────────────────────────────────────────
  // STEP 4 — Confirmation
  // ────────────────────────────────────────────────────────
  } else if (currentStep === 4) {
    clearInterval(timerInt);
    const slot = SESSION_SLOTS.find(s => s.id === selectedSlot);
    el.innerHTML = `
    <div class="bcard" style="text-align:center;">
      <div style="width:72px;height:72px;background:var(--green-pale);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2rem;margin:0 auto 20px;">✅</div>
      <h2 style="margin-bottom:8px;">Booking Confirmed!</h2>
      <p style="color:var(--text-muted);font-size:14px;max-width:460px;margin:0 auto 20px;">Your place is secured. A confirmation has been sent to <strong>${currentUser?.email || guestEmail}</strong>.</p>
      <div class="booking-ref-box">${bookingRef}</div>
      <div style="background:var(--cream);border-radius:var(--radius-lg);padding:20px;max-width:420px;margin:0 auto 28px;text-align:left;">
        <div class="order-row"><span class="lbl">Course</span><span class="val" style="font-size:12px;text-align:right;max-width:220px;">${courseData.title.substring(0,50)}…</span></div>
        <div class="order-row"><span class="lbl">Session Time</span><span class="val">${slot?.name} · ${slot?.time}</span></div>
        <div class="order-row"><span class="lbl">Duration</span><span class="val">3 Days</span></div>
        <div class="order-row" style="border:none;"><span class="lbl">Amount Paid</span><span class="val" style="color:var(--green);">UGX 100,000 ✓</span></div>
      </div>
      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
        <a href="dashboard.html" class="btn btn-primary">Go to My Dashboard →</a>
        <a href="courses.html"   class="btn btn-outline-green">Book Another Course</a>
      </div>
      <p style="font-size:12px;color:var(--text-muted);margin-top:20px;">📧 Zoom link will be sent to your email 24 hours before your first session</p>
    </div>`;
  }
}

// ── Step navigation ───────────────────────────────────────
function step1Next() {
  if (!selectedSlot) { alert('Please select a session time to continue.'); return; }
  currentStep = 2; renderStep();
}

function step2Next() {
  const first = document.getElementById('s2-first').value.trim();
  const last  = document.getElementById('s2-last').value.trim();
  const email = document.getElementById('s2-email').value.trim();
  const phone = document.getElementById('s2-phone').value.trim();
  if (!first || !last || !email || !phone) {
    const e = document.getElementById('s2-err');
    document.getElementById('s2-err-txt').textContent = 'Please fill in all required fields.';
    e.style.display = 'flex'; return;
  }
  // Save guest details
  guestName  = first + ' ' + last;
  guestEmail = email;
  guestPhone = phone;
  guestJob   = document.getElementById('s2-job').value.trim();
  guestOrg   = document.getElementById('s2-org').value.trim();

  // If logged in, update profile silently
  if (currentUser) {
    getSB().from('profiles').update({ full_name:guestName, phone:guestPhone, job_title:guestJob, organisation:guestOrg }).eq('id', currentUser.id);
    currentProfile = { ...currentProfile, full_name:guestName, phone:guestPhone, job_title:guestJob, organisation:guestOrg };
  }
  currentStep = 3; renderStep();
}

function prevStep() { if (currentStep > 1) { currentStep--; renderStep(); } }

// ── Auth tab switcher ─────────────────────────────────────
function switchAuthTab(tab) {
  document.getElementById('tab-login-btn').classList.toggle('active', tab === 'login');
  document.getElementById('tab-register-btn').classList.toggle('active', tab === 'register');
  document.getElementById('auth-login').classList.toggle('active', tab === 'login');
  document.getElementById('auth-register').classList.toggle('active', tab === 'register');
}

// ── Inline login ──────────────────────────────────────────
async function doInlineLogin() {
  const email = document.getElementById('li-email').value.trim();
  const pass  = document.getElementById('li-pass').value;
  const errEl = document.getElementById('login-err');
  const errTx = document.getElementById('login-err-txt');
  errEl.style.display = 'none';

  if (!email || !pass) { errTx.textContent = 'Please enter your email and password.'; errEl.style.display = 'flex'; return; }

  const btn = document.getElementById('li-btn');
  btn.innerHTML = '<div class="spinner"></div> Signing in…'; btn.disabled = true;

  const { data, error } = await getSB().auth.signInWithPassword({ email, password: pass });
  if (error) {
    errTx.textContent = 'Incorrect email or password. Please try again.';
    errEl.style.display = 'flex'; btn.innerHTML = 'Sign In & Continue →'; btn.disabled = false; return;
  }

  currentUser    = data.user;
  currentProfile = await getProfile(data.user.id);
  // Show payment section
  renderStep();
}

// ── Inline register ───────────────────────────────────────
async function doInlineRegister() {
  const first = document.getElementById('rg-first').value.trim();
  const last  = document.getElementById('rg-last').value.trim();
  const email = document.getElementById('rg-email').value.trim();
  const pass  = document.getElementById('rg-pass').value;
  const errEl = document.getElementById('reg-err');
  const errTx = document.getElementById('reg-err-txt');
  errEl.style.display = 'none';

  if (!first || !last || !email || pass.length < 8) {
    errTx.textContent = !first || !last || !email ? 'Please fill in all fields.' : 'Password must be at least 8 characters.';
    errEl.style.display = 'flex'; return;
  }

  const btn = document.getElementById('rg-btn');
  btn.innerHTML = '<div class="spinner"></div> Creating account…'; btn.disabled = true;

  const fullName = first + ' ' + last;
  const { data, error } = await getSB().auth.signUp({ email, password: pass, options: { data: { full_name: fullName } } });

  if (error) {
    errTx.textContent = error.message; errEl.style.display = 'flex';
    btn.innerHTML = 'Create Account & Continue →'; btn.disabled = false; return;
  }

  // Save profile
  if (data.user) {
    await getSB().from('profiles').upsert({ id: data.user.id, full_name: fullName, phone: guestPhone, job_title: guestJob, organisation: guestOrg });
  }

  // Sign in immediately (skip email confirmation for flow)
  const { data: signInData } = await getSB().auth.signInWithPassword({ email, password: pass });
  if (signInData?.user) {
    currentUser    = signInData.user;
    currentProfile = await getProfile(signInData.user.id);
  }
  renderStep();
}

// ── Payment method ────────────────────────────────────────
function selectMethod(method) {
  selectedMethod = method;
  document.querySelectorAll('.pay-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('pm-' + method).classList.add('selected');
  document.getElementById('phone-section').style.display = 'block';
  document.getElementById('phone-label').textContent = method === 'mtn' ? 'MTN Mobile Money Number' : 'Airtel Money Number';
  showUSSD();
}

function showUSSD() {
  const phone   = document.getElementById('momo-phone')?.value || '';
  const ussdBox = document.getElementById('ussd-box');
  if (!ussdBox) return;
  ussdBox.style.display = 'block';
  const isMTN = selectedMethod === 'mtn';
  document.getElementById('ussd-code').textContent = isMTN ? '*165*3#' : '*185*9#';
  document.getElementById('ussd-steps').innerHTML = isMTN ? `
    <li><span class="ussd-step-num">1</span>On your MTN phone dial <strong>*165*3#</strong></li>
    <li><span class="ussd-step-num">2</span>Select <strong>Pay Bills</strong> or <strong>Pay Merchant</strong></li>
    <li><span class="ussd-step-num">3</span>Enter Merchant Code: <strong>BASE-CPA</strong></li>
    <li><span class="ussd-step-num">4</span>Enter amount: <strong>100,000</strong></li>
    <li><span class="ussd-step-num">5</span>Enter your Mobile Money PIN to confirm</li>
    <li><span class="ussd-step-num">6</span>You will get an SMS — then click <strong>Confirm & Pay</strong> below</li>` : `
    <li><span class="ussd-step-num">1</span>On your Airtel phone dial <strong>*185*9#</strong></li>
    <li><span class="ussd-step-num">2</span>Select <strong>Pay Bill</strong></li>
    <li><span class="ussd-step-num">3</span>Enter Business Number: <strong>BASE-CPA</strong></li>
    <li><span class="ussd-step-num">4</span>Enter amount: <strong>100,000</strong></li>
    <li><span class="ussd-step-num">5</span>Enter your Airtel Money PIN to confirm</li>
    <li><span class="ussd-step-num">6</span>You will get an SMS — then click <strong>Confirm & Pay</strong> below</li>`;
}

function applyPromo() {
  const code = document.getElementById('promo-code').value.trim().toUpperCase();
  const msg  = document.getElementById('promo-msg');
  msg.style.display = 'flex';
  if (code === 'BASE10') {
    msg.className = 'alert alert-success show';
    msg.textContent = '✓ Promo applied! 10% discount — new total: UGX 106,200';
  } else {
    msg.className = 'alert alert-danger show';
    msg.textContent = '✗ Invalid promo code.';
  }
}

// ── Confirm payment ───────────────────────────────────────
async function doPayment() {
  if (!currentUser) { alert('Please sign in or create an account to complete your booking.'); return; }
  if (!selectedMethod) { alert('Please select a payment method.'); return; }

  const phone = document.getElementById('momo-phone')?.value.trim();
  if (!phone || phone.length < 9) {
    document.getElementById('e-momo-phone').classList.add('show');
    document.getElementById('momo-phone').classList.add('input-error'); return;
  }

  const btn = document.getElementById('pay-btn');
  btn.innerHTML = '<div class="spinner"></div> Confirming…'; btn.disabled = true;

  // Re-check capacity to guard against race conditions
  const slotObj = SESSION_SLOTS.find(s => s.id === selectedSlot);
  const slotKey = slotObj ? slotObj.name + ' · ' + slotObj.time : selectedSlot;
  const { count: takenCount } = await getSB()
    .from('bookings')
    .select('*', { count: 'exact', head: true })
    .eq('course_id', courseData.id)
    .eq('session_slot', slotKey)
    .eq('status', 'confirmed');
  if (takenCount >= SLOT_CAPACITY) {
    document.getElementById('pay-err-txt').textContent = 'Sorry, this session just filled up. Please go back and choose a different time slot.';
    document.getElementById('pay-err').style.display = 'flex';
    btn.innerHTML = 'Confirm &amp; Pay UGX 100,000 →'; btn.disabled = false; return;
  }

  const ts  = Date.now().toString().slice(-6);
  const uid = Math.random().toString(36).substring(2,5).toUpperCase();
  bookingRef = 'BA-' + ts + '-' + uid;

  const slot = SESSION_SLOTS.find(s => s.id === selectedSlot);

  const { error } = await getSB().from('bookings').insert({
    user_id:        currentUser.id,
    course_id:      courseData.id,
    course_title:   courseData.title,
    session_slot:   slot ? slot.name + ' · ' + slot.time : selectedSlot,
    status:         'confirmed',
    payment_method: selectedMethod,
    payment_phone:  '+256' + phone,
    payment_status: 'paid',
    amount_ugx:     COURSE_FEE,
    booking_ref:    bookingRef,
  });

  if (error) {
    document.getElementById('pay-err-txt').textContent = 'Booking failed: ' + error.message;
    document.getElementById('pay-err').style.display = 'flex';
    btn.innerHTML = 'Confirm &amp; Pay UGX 100,000 →'; btn.disabled = false; return;
  }

  // Send confirmation email (non-blocking — booking is already saved)
  sendBookingEmail({
    toName:      guestName,
    toEmail:     currentUser?.email || guestEmail,
    bookingRef:  bookingRef,
    courseTitle: courseData.title,
    sessionSlot: slotObj ? slotObj.name + ' · ' + slotObj.time : selectedSlot,
    amountUgx:   COURSE_FEE,
  });

  currentStep = 4; renderStep();
}
</script>
